services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lead_tracker
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3101:3101"
    environment:
      PORT: "3101"
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: lead_tracker
      CORS_ORIGIN: http://localhost:3000,http://localhost:3100,http://127.0.0.1:3000,http://127.0.0.1:3100
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        # Use IPv4 so Windows browsers do not call ::1 while the published port is IPv4-only
        NEXT_PUBLIC_API_URL: http://127.0.0.1:3101
    ports:
      - "3000:3000"
    depends_on:
      - backend
